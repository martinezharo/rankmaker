name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Correctness gate — the same checks CLAUDE.md relies on, now enforced in CI.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

  # Deploy readiness — fails if prod D1 has un-applied migrations or is missing a
  # required secret. Needs a CLOUDFLARE_API_TOKEN repo secret; skips (with a
  # warning) until that's configured so it never blocks before you're ready.
  deploy-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check migrations + secrets against production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping deploy-readiness check. Add it under Settings → Secrets and variables → Actions to enable."
            exit 0
          fi
          pnpm run check:deploy
